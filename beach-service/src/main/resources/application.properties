spring.application.name=beach-service

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

server.port=8080

# Increase async request timeout (ms) for CompletableFuture controller endpoints.
# The default 30s is too short when getAllBeaches fires parallel Feign calls to country-service.
spring.mvc.async.request-timeout=60000

# URL for country-service (overridden in Docker)
# Used by Feign client in CountryClient.java class
country.service.url=${COUNTRY_SERVICE_URL:http://localhost:8081}
